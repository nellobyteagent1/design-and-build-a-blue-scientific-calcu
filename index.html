<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1: Scientific functions -->
      <button class="btn sci" data-action="sin">sin</button>
      <button class="btn sci" data-action="cos">cos</button>
      <button class="btn sci" data-action="tan">tan</button>
      <button class="btn sci" data-action="ln">ln</button>
      <button class="btn sci" data-action="log">log</button>

      <!-- Row 2: More scientific -->
      <button class="btn sci" data-action="sqrt">&radic;</button>
      <button class="btn sci" data-action="power">x<sup>y</sup></button>
      <button class="btn sci" data-action="square">x&sup2;</button>
      <button class="btn sci" data-action="reciprocal">1/x</button>
      <button class="btn sci" data-action="pi">&pi;</button>

      <!-- Row 3: Parens, clear, percent -->
      <button class="btn op" data-action="(">(</button>
      <button class="btn op" data-action=")">)</button>
      <button class="btn op" data-action="%">%</button>
      <button class="btn danger" data-action="clear">AC</button>
      <button class="btn danger" data-action="delete">DEL</button>

      <!-- Row 4: Numbers and divide -->
      <button class="btn num" data-action="7">7</button>
      <button class="btn num" data-action="8">8</button>
      <button class="btn num" data-action="9">9</button>
      <button class="btn op" data-action="/">&divide;</button>
      <button class="btn sci" data-action="e">e</button>

      <!-- Row 5: Numbers and multiply -->
      <button class="btn num" data-action="4">4</button>
      <button class="btn num" data-action="5">5</button>
      <button class="btn num" data-action="6">6</button>
      <button class="btn op" data-action="*">&times;</button>
      <button class="btn sci" data-action="factorial">n!</button>

      <!-- Row 6: Numbers and subtract -->
      <button class="btn num" data-action="1">1</button>
      <button class="btn num" data-action="2">2</button>
      <button class="btn num" data-action="3">3</button>
      <button class="btn op" data-action="-">&minus;</button>
      <button class="btn sci" data-action="negate">&plusmn;</button>

      <!-- Row 7: Zero, dot, equals, add -->
      <button class="btn num zero" data-action="0">0</button>
      <button class="btn num" data-action=".">.</button>
      <button class="btn equals" data-action="=">=</button>
      <button class="btn op" data-action="+">+</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
